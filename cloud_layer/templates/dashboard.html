<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartEyes | Authority Dashboard</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/style.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top py-3">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-gradient" href="/">
                <i class="fa-solid fa-eye me-2"></i>SmartEyes
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/"><i class="fa-solid fa-chart-line me-1"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/citizen"><i class="fa-solid fa-users me-1"></i> Citizen Portal</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid px-4 py-5">
        
        <!-- Header -->
        <div class="row mb-4 animate-fade-in">
            <div class="col-12">
                <h2 class="fw-bold mb-1">Live Feed Analytics</h2>
                <p class="text-secondary">Real-time monitoring of traffic and civic violations.</p>
            </div>
        </div>

        <!-- Stats Row -->
        <div class="row mb-5 animate-fade-in" style="animation-delay: 0.1s;">
            <div class="col-md-3 mb-3">
                <div class="glass-panel p-4 stat-card h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-secondary mb-1">Total Violations</h6>
                            <h3 class="fw-bold mb-0" id="totalViolations">0</h3>
                        </div>
                        <div class="p-3 rounded-circle" style="background: rgba(79, 70, 229, 0.2); color: #818cf8;">
                            <i class="fa-solid fa-car-burst fa-lg"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="glass-panel p-4 stat-card h-100">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-secondary mb-1">Today's Challans</h6>
                            <h3 class="fw-bold mb-0 text-gradient">₹0</h3>
                        </div>
                        <div class="p-3 rounded-circle" style="background: rgba(16, 185, 129, 0.2); color: #34d399;">
                            <i class="fa-solid fa-file-invoice-dollar fa-lg"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="glass-panel p-4 h-100 d-flex flex-column justify-content-center">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary text-secondary">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </span>
                        <input type="text" class="form-control form-control-custom border-start-0" id="searchInput" placeholder="Search by Vehicle Number or Challan ID...">
                    </div>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="row animate-fade-in" style="animation-delay: 0.2s;">
            <div class="col-12">
                <div class="glass-panel overflow-hidden">
                    <div class="p-4 border-bottom border-secondary" style="border-color: rgba(255,255,255,0.1) !important;">
                        <h5 class="mb-0 fw-bold"><i class="fa-solid fa-list-check me-2"></i>Recent Violations Stream</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-custom table-borderless">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Vehicle #</th>
                                    <th>Violations</th>
                                    <th>Location</th>
                                    <th>Fine Amt</th>
                                    <th>Evidence</th>
                                </tr>
                            </thead>
                            <tbody id="violationTableBody">
                                <!-- Data injected via JS -->
                                <tr>
                                    <td colspan="6" class="text-center py-5 text-secondary">
                                        <div class="spinner-border text-primary" role="status"></div>
                                        <p class="mt-2 text-sm">Connecting to server feed...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Image Modal -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content glass-panel" style="background-color: var(--bg-color);">
          <div class="modal-header border-bottom-0">
            <h5 class="modal-title">Evidence View</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-0 text-center position-relative">
            <img src="" id="modalImg" class="img-fluid rounded-bottom" alt="Violation Evidence" style="width: 100%;">
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <input type="hidden" id="pageType" value="dashboard">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
